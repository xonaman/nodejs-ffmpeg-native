name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 pins VS 2022; windows-latest moved to VS 2026 whose MSVC
        # hits an internal compiler error (C1001) building node-addon-api.
        os: [ubuntu-latest, macos-latest, windows-2022]
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config ffmpeg

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config ffmpeg

      - name: Install ffmpeg for fixtures (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install ffmpeg --no-progress -y

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check
      - run: npm run typecheck

      - name: Cache native dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download-openh264.mjs', 'scripts/download-ffmpeg.mjs', 'scripts/download-ffmpeg-windows.mjs', 'scripts/native-deps.json') }}

      - name: Build OpenH264 + FFmpeg (Unix)
        if: runner.os != 'Windows'
        run: |
          node scripts/download-openh264.mjs
          node scripts/download-ffmpeg.mjs

      - name: Build FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: node scripts/download-ffmpeg-windows.mjs
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Build native addon
        run: |
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs

      - name: Generate fixtures
        run: node test/create-fixtures.mjs

      - run: npm test

  prebuild:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          # macos-15-intel is GitHub's supported native-x64 Intel runner (the
          # old macos-13 label is being retired). Building darwin-x64 on real
          # Intel hardware avoids cross-compiling FFmpeg's asm from source.
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config ffmpeg

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config ffmpeg

      - name: Install ffmpeg for fixtures (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install ffmpeg --no-progress -y

      - run: npm ci --ignore-scripts

      - name: Cache native dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('scripts/download-openh264.mjs', 'scripts/download-ffmpeg.mjs', 'scripts/download-ffmpeg-windows.mjs', 'scripts/native-deps.json') }}

      - name: Build OpenH264 and FFmpeg (Unix)
        if: runner.os != 'Windows'
        run: |
          node scripts/download-openh264.mjs
          node scripts/download-ffmpeg.mjs

      - name: Build FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: node scripts/download-ffmpeg-windows.mjs
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Bundle (strip)
        run: node scripts/bundle-lib.mjs

      - name: Generate fixtures and test
        run: |
          node test/create-fixtures.mjs
          npm test

      - name: Create tarball
        shell: bash
        run: |
          tar czf "ffmpeg-native-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            build/Release/ffmpeg.node

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: ffmpeg-native-*.tar.gz

  prebuild-linux-cross:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            docker-platform: linux/arm64
            image: node:22-bookworm
          - arch: x64
            platform-suffix: musl
            docker-platform: linux/amd64
            image: node:22-alpine
          - arch: arm64
            platform-suffix: musl
            docker-platform: linux/arm64
            image: node:22-alpine
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: ${{ matrix.docker-platform }}

      - name: Cache native dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: deps-linux-${{ matrix.platform-suffix || 'glibc' }}-${{ matrix.arch }}-${{ hashFiles('scripts/download-openh264.mjs', 'scripts/download-ffmpeg.mjs', 'scripts/download-ffmpeg-windows.mjs', 'scripts/native-deps.json') }}

      - name: Build in Docker
        timeout-minutes: 180
        run: |
          docker run --rm --platform ${{ matrix.docker-platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ matrix.image }} \
            sh -c "
              if command -v apk > /dev/null; then
                apk add --no-cache build-base nasm pkgconfig python3 ffmpeg bash
              else
                apt-get update && apt-get install -y build-essential nasm pkg-config python3 ffmpeg
              fi &&
              npm ci --ignore-scripts &&
              node scripts/download-openh264.mjs &&
              node scripts/download-ffmpeg.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs &&
              node test/create-fixtures.mjs &&
              npm test
            "

      - name: Create tarball
        run: |
          suffix="${{ matrix.platform-suffix }}"
          if [ -n "$suffix" ]; then
            tar czf "ffmpeg-native-${{ github.ref_name }}-linux-${suffix}-${{ matrix.arch }}.tar.gz" \
              build/Release/ffmpeg.node
          else
            tar czf "ffmpeg-native-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz" \
              build/Release/ffmpeg.node
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prebuild-linux-${{ matrix.platform-suffix && format('{0}-', matrix.platform-suffix) || '' }}${{ matrix.arch }}
          path: ffmpeg-native-*.tar.gz

  release:
    needs: [prebuild, prebuild-linux-cross]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: prebuild-*
          path: artifacts
          merge-multiple: true

      - name: Generate prebuild checksum manifest
        run: node scripts/gen-prebuild-manifest.mjs artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: artifacts/*.tar.gz

      # The GitHub release (with the prebuilt tarballs) must exist BEFORE npm
      # publish: scripts/install.mjs fetches prebuilts from the release by
      # version, so publishing first would make every install during the gap
      # fall back to a from-source compile (or 404).
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.tar.gz --generate-notes

      # Publishes tokenlessly via OIDC trusted publishing — no NPM_TOKEN. Requires
      # a trusted publisher configured on npmjs.com (package Settings -> Trusted
      # Publisher) pointing at xonaman/nodejs-ffmpeg-native, workflow release.yml,
      # environment npm. The first publish is done locally; once the trusted
      # publisher is configured, tag pushes publish from here.
      - name: Publish to npm
        run: npm publish --provenance
