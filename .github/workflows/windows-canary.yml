name: Windows Canary

# Periodically re-tests whether windows-latest (currently VS 2026) can build
# the addon again. While it can't, ci.yml/release.yml stay pinned to
# windows-2022. A green run here is the signal to drop that pin.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  windows-latest:
    name: Build on windows-latest
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install ffmpeg for fixtures
        continue-on-error: true
        run: choco install ffmpeg --no-progress -y

      - run: npm ci --ignore-scripts

      - name: Try building on windows-latest
        id: build
        continue-on-error: true
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          node scripts/download-ffmpeg-windows.mjs
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs
          node test/create-fixtures.mjs
          npm test

      - name: Report
        shell: bash
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "✅ windows-latest builds — you can drop the windows-2022 pin in ci.yml and release.yml." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ windows-latest still fails (VS 2026 C1001 ICE) — keep the windows-2022 pin." >> "$GITHUB_STEP_SUMMARY"
          fi
