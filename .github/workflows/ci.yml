name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 pins VS 2022; windows-latest moved to VS 2026 whose MSVC
        # hits an internal compiler error (C1001) building node-addon-api.
        # The windows-canary workflow re-tests windows-latest weekly; drop this
        # pin once it goes green.
        os: [ubuntu-latest, macos-latest, windows-2022]
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config ffmpeg

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config ffmpeg

      - name: Install ffmpeg for fixtures (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install ffmpeg --no-progress -y

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check
      - run: npm run typecheck

      - name: Cache native dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download-openh264.mjs', 'scripts/download-ffmpeg.mjs', 'scripts/download-ffmpeg-windows.mjs', 'scripts/native-deps.json', 'vcpkg.json') }}

      - name: Build OpenH264 + FFmpeg (Unix)
        if: runner.os != 'Windows'
        run: |
          node scripts/download-openh264.mjs
          node scripts/download-ffmpeg.mjs

      - name: Build FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: node scripts/download-ffmpeg-windows.mjs
        env:
          VCPKG_ROOT: C:\vcpkg

      - name: Build native addon
        run: |
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs

      - name: Generate fixtures
        run: node test/create-fixtures.mjs

      - run: npm test
