name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm pkg-config ffmpeg

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm pkg-config ffmpeg

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check

      - name: Build OpenH264, FFmpeg, and native addon
        run: |
          node scripts/download-openh264.mjs
          node scripts/download-ffmpeg.mjs
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs

      - run: npx tsc --noEmit

      - name: Generate fixtures
        run: node test/create-fixtures.mjs

      - run: npm test
